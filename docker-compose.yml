services:
  backend:
    build:
      context: ./backend/ArticleRegistration.Api
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__ArticleRegistration: Data Source=App_Data/article-registration.db
    ports:
      - "5000:8080"
    volumes:
      - backend-data:/app/App_Data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  backend-data: